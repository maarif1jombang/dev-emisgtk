<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Peta Situs Dev-Emis GTK</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom scrollbar to match modern UI */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1; 
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8; 
        }
        
        /* Hide scrollbar for filter container but allow scrolling */
        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }
        .scrollbar-hide {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* Toast animation */
        @keyframes fadeOut {
            0% { opacity: 1; transform: translateY(0); }
            80% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-10px); }
        }
        .toast {
            animation: fadeOut 2s forwards;
        }
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: '#059669', // The purple-blue main color
                        bgMain: '#f4f7fc'
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-bgMain text-slate-800 font-sans min-h-screen flex flex-col">

    <!-- Toast Notification Container -->
    <div id="toast-container" class="fixed top-5 right-5 z-50 flex flex-col gap-2"></div>

    <!-- Header & Navigation -->
    <div class="sticky top-0 z-50 bg-white border-b border-slate-200 shadow-sm">
        <!-- Top Header Bar -->
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center py-4 gap-3">
                
                <!-- Logo & Title -->
                <div class="flex items-center gap-2.5">
                    <div class="bg-brand w-10 h-10 rounded-lg flex items-center justify-center text-white text-xl shadow-sm">
                        🕌
                    </div>
                    <div>
                        <h1 class="text-lg font-bold text-slate-900 leading-snug">Peta Situs Dev-Emis GTK</h1>
                        <p class="text-xs text-slate-500">
                            &bull; <span class="text-brand font-medium" id="total-links-count">0 link tersedia</span>
                        </p>
                    </div>
                </div>

                <!-- Search Bar -->
                <div class="w-full md:w-auto">
                    <div class="relative w-full md:w-72">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <svg class="h-4 w-4 text-slate-400" viewBox="0 0 20 20" fill="currentColor">
                                <path fill-rule="evenodd" d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z" clip-rule="evenodd" />
                            </svg>
                        </div>
                        <input type="text" id="searchInput" 
                            class="block w-full pl-9 pr-3 py-1.5 border border-slate-200 rounded-lg leading-5 bg-slate-50 placeholder-slate-400 focus:outline-none focus:bg-white focus:ring-2 focus:ring-brand focus:border-brand text-sm transition-colors" 
                            placeholder="Cari aplikasi...">
                    </div>
                </div>
            </div>
        </div>

        <!-- Filter Navigation -->
        <div class="bg-white/80 backdrop-blur-sm">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex overflow-x-auto py-2 gap-2 scrollbar-hide" id="filterContainer">
                    <!-- Filter buttons will be injected here -->
                </div>
            </div>
        </div>
    </div>

    <!-- Main Content Area -->
    <main class="max-w-7xl w-full mx-auto px-4 sm:px-6 lg:px-8 py-6 flex-grow">
        <!-- Grid Container -->
        <div id="cardsContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 lg:gap-5 items-start">
            <!-- Cards will be injected here by JS -->
        </div>
        
        <!-- Empty State -->
        <div id="emptyState" class="hidden text-center py-20">
            <div class="text-5xl mb-4">🔍</div>
            <h3 class="text-lg font-medium text-slate-900">Aplikasi tidak ditemukan</h3>
            <p class="text-slate-500 mt-1">Coba gunakan kata kunci pencarian yang lain.</p>
        </div>
    </main>

    <!-- Footer - Fixed/Sticky at Bottom -->
    <footer class="sticky bottom-0 z-50 bg-white/90 backdrop-blur-md border-t border-slate-200 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)]">
        <div class="flex flex-col items-center justify-center gap-1.5 py-2 text-slate-400">
            <p class="flex items-center justify-center gap-1.5 text-sm">
                <span>🕌</span>
                <span>Peta Situs Dev-Emis GTK</span>
            </p>
            <p class="flex items-center justify-center text-xs">
                <span>Klik</span>
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="mx-1"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line></svg>
                <span>untuk membuka</span>
                <span class="mx-2">|</span>
                <span>Klik</span>
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="mx-1"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                <span>untuk menyalin link</span>
            </p>
        </div>
    </footer>

    <script>
        // --- Data Structure ---
        const themes = {
            emerald: { text: 'text-emerald-700', bg: 'bg-emerald-100', border: 'border-emerald-300', lightBg: 'bg-emerald-50' },
			cyan:    { text: 'text-cyan-700', bg: 'bg-cyan-100', border: 'border-cyan-300', lightBg: 'bg-cyan-50' },
            blue:    { text: 'text-blue-700', bg: 'bg-blue-100', border: 'border-blue-300', lightBg: 'bg-blue-50' },
            purple:  { text: 'text-purple-700', bg: 'bg-purple-100', border: 'border-purple-300', lightBg: 'bg-purple-50' },
            pink:    { text: 'text-pink-700', bg: 'bg-pink-100', border: 'border-pink-300', lightBg: 'bg-pink-50' },
            red:     { text: 'text-red-700', bg: 'bg-red-100', border: 'border-red-300', lightBg: 'bg-red-50' },
			orange:  { text: 'text-orange-700', bg: 'bg-orange-100', border: 'border-orange-300', lightBg: 'bg-orange-50' },
			gray:    { text: 'text-gray-700', bg: 'bg-gray-100', border: 'border-gray-300', lightBg: 'bg-gray-50' }
        };

        const appData = [
            {
                id: 'MENU UTAMA', name: 'MENU UTAMA', icon: '🏫', theme: themes.emerald,
                links: [
                    { title: 'Aktivasi PTK', url: 'https://dev-emisgtk.kemenag.go.id/ptk/aktivasi-ptk/' },
					{ title: 'Biodata', url: 'https://dev-emisgtk.kemenag.go.id/identitas/biodata/' },
					{ title: 'Tugas Tambahan', url: 'https://dev-emisgtk.kemenag.go.id/ptk/tugas-tambahan/self/' },
                    { title: 'Jadwal Mengajar', url: 'https://dev-emisgtk.kemenag.go.id/ptk/jadwal-mengajar/' },
					{ title: 'Riwayat Pelatihan', url: 'https://dev-emisgtk.kemenag.go.id/diklat/pelatihan-eksternal/' }
                ]
            },
            {
                id: 'DOKUMEN', name: 'DOKUMEN', icon: '✅', theme: themes.cyan,
                links: [
                    { title: 'Data Ijazah', url: 'https://dev-emisgtk.kemenag.go.id/ptk/ijazah/' },
					{ title: 'Data Sertifikasi', url: 'https://dev-emisgtk.kemenag.go.id/ptk/sertifikasi/' },
					{ title: 'Pengajuan NRG', url: 'https://dev-emisgtk.kemenag.go.id/tunjangan/nrg/' },
                    { title: 'Verval NRG', url: 'https://dev-emisgtk.kemenag.go.id/tunjangan/ptk/verval-nrg/' },
					{ title: 'Verval Inpassing', url: 'https://dev-emisgtk.kemenag.go.id/tunjangan/inpassing/' }
                ]
            },
            {
                id: 'PERSYARATAN TPG', name: 'PERSYARATAN TPG', icon: '💰', theme: themes.blue,
                links: [
                    { title: 'Perhitungan JTM', url: 'https://dev-emisgtk.kemenag.go.id/ptk/jtm/' },
					{ title: 'Dispensasi JTM', url: 'https://dev-emisgtk.kemenag.go.id/ptk/dispensasi-jtm/' },
					{ title: 'Pengajuan SKMT', url: 'https://dev-emisgtk.kemenag.go.id/tunjangan/skmt/' },
					{ title: 'Pengajuan SKBK', url: 'https://dev-emisgtk.kemenag.go.id/tunjangan/skbk/' },
					{ title: 'SKAKPT', url: 'https://dev-emisgtk.kemenag.go.id/tunjangan/skakpt/' }
                ]
            },
            {
                id: 'VERVAL KEPALA', name: 'VERVAL KEPALA', icon: '📝', theme: themes.purple,
                links: [
                    { title: 'Verifikasi Jadwal Non-Satminkal', url: 'https://dev-emisgtk.kemenag.go.id/ptk/non-satminkal/verifikasi/jadwal-mengajar/' },
					{ title: 'Verifikasi SKMT', url: 'https://dev-emisgtk.kemenag.go.id/tunjangan/skmt-kepala/' },
					{ title: 'Verifikasi SKBK', url: 'https://dev-emisgtk.kemenag.go.id/tunjangan/skbk-kepala/' }
                ]
            },

            {
                id: 'MENU PPG', name: 'MENU PPG', icon: '📊', theme: themes.red,
                links: [
                    { title: 'Pengecekan Persyaratan', url: 'https://dev-emisgtk.kemenag.go.id/sertifikasi/ppg/ptk/' },
					{ title: 'Validasi Linieritas Ijazah', url: 'https://dev-emisgtk.kemenag.go.id/sertifikasi/ppg/ptk/linieritas/' },
					{ title: 'Pengajuan Mapel PPG', url: 'https://dev-emisgtk.kemenag.go.id/sertifikasi/ppg/ptk/pengajuan-mapel/' }
                ]
            },
            {
                id: 'TUNJANGAN', name: 'TUNJANGAN', icon: '🥇', theme: themes.orange,
                links: [
                    { title: 'Tunjangan Insentif', url: 'https://dev-emisgtk.kemenag.go.id/tunjangan/pengajuan-insentif/ptk/' },
					{ title: 'Tunjangan Khusus', url: 'https://dev-emisgtk.kemenag.go.id/tunjangan/tunjangan-khusus/ptk/info-penetapan/' }
                ]
            },
						{
                id: 'DLL', name: 'MENU LAINNYA', icon: '🏗️', theme: themes.gray,
                links: [
                    { title: 'Alih Fungsi', url: 'https://dev-emisgtk.kemenag.go.id/ptk/mutasi-alih-fungsi/' },
					{ title: 'Pengajuan Verval Satminkal', url: 'https://dev-emisgtk.kemenag.go.id/ptk/non-satminkal/pengajuan/verval-satminkal/' },
					{ title: 'Murrotal Mp3', url: 'https://murrotal30juz.netlify.app/' }
                ]
            }
        ];

        // --- State ---
        let currentFilter = 'all';
        let searchQuery = '';

        // --- DOM Elements ---
        const filterContainer = document.getElementById('filterContainer');
        const cardsContainer = document.getElementById('cardsContainer');
        const searchInput = document.getElementById('searchInput');
        const totalLinksCountEl = document.getElementById('total-links-count');
        const emptyState = document.getElementById('emptyState');
        const toastContainer = document.getElementById('toast-container');

        // --- SVG Icons ---
        const externalLinkIcon = `<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-slate-400 hover:text-brand transition-colors"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line></svg>`;
        const copyIcon = `<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-slate-400 hover:text-brand transition-colors"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>`;

        // --- Initialization ---
        function init() {
            renderFilters();
            updateTotalCount();
            renderCards();
            
            // Event Listeners
            searchInput.addEventListener('input', (e) => {
                searchQuery = e.target.value.toLowerCase();
                renderCards();
            });
        }

        // --- Rendering Functions ---

        function renderFilters() {
            filterContainer.innerHTML = '';
            
            // "Semua" (All) button
            const allBtn = createFilterButton('all', 'Semua', null);
            filterContainer.appendChild(allBtn);

            // Category buttons
            appData.forEach(cat => {
                const btn = createFilterButton(cat.id, cat.name, cat.icon);
                filterContainer.appendChild(btn);
            });
        }

        function createFilterButton(id, name, icon) {
            const btn = document.createElement('button');
            const isActive = currentFilter === id;
            
            // Base classes
            let classes = "px-3.5 py-1.5 rounded-full text-xs font-medium whitespace-nowrap border flex items-center gap-1.5 transition-all duration-200 ";
            
            if (isActive) {
                classes += "bg-brand text-white border-brand shadow-sm";
            } else {
                classes += "bg-white text-slate-600 border-brand hover:bg-slate-50 hover:border-slate-300";
            }
            
            btn.className = classes;
            btn.onclick = () => {
                currentFilter = id;
                renderFilters(); // Re-render to update active state
                renderCards();
            };

            if (icon) {
                btn.innerHTML = `<span class="text-sm">${icon}</span> ${name}`;
            } else {
                btn.innerHTML = name;
            }

            return btn;
        }

        function renderCards() {
            cardsContainer.innerHTML = '';
            let hasVisibleCards = false;

            appData.forEach(category => {
                // Check if category matches filter
                if (currentFilter !== 'all' && currentFilter !== category.id) return;

                // Filter links within category based on search
                const filteredLinks = category.links.filter(link => 
                    link.title.toLowerCase().includes(searchQuery) || 
                    category.name.toLowerCase().includes(searchQuery)
                );

                // If no links match search in this category, skip it
                if (filteredLinks.length === 0) return;

                hasVisibleCards = true;

                // Create Card
                const card = document.createElement('div');
                card.className = `bg-white rounded-2xl shadow-sm border ${category.theme.border} overflow-hidden flex flex-col transition-shadow hover:shadow-md`;
                
                // Card Header
                const header = document.createElement('div');
                header.className = `px-4 py-2.5 flex justify-between items-center border-b ${category.theme.border} ${category.theme.lightBg}`;
                header.innerHTML = `
                    <div class="flex items-center gap-2">
                        <span class="text-lg">${category.icon}</span>
                        <h2 class="font-bold text-slate-800 tracking-tight text-sm">${category.name}</h2>
                    </div>
                    <span class="px-2.5 py-0.5 text-[10px] font-semibold rounded-full ${category.theme.bg} ${category.theme.text}">
                        ${filteredLinks.length} link${filteredLinks.length > 1 ? 's' : ''}
                    </span>
                `;
                card.appendChild(header);

                // Links Container
                const linksContainer = document.createElement('div');
                linksContainer.className = "p-3 flex flex-col gap-1.5";

                filteredLinks.forEach((link, index) => {
                    const linkItem = document.createElement('div');
                    linkItem.className = `flex items-center justify-between px-3 py-2 rounded-lg border border-slate-100 bg-white hover:border-slate-300 hover:shadow-sm transition-all group`;
                    
                    linkItem.innerHTML = `
                        <div class="flex items-center gap-2.5 overflow-hidden">
                            <span class="w-6 h-6 flex-shrink-0 rounded-full flex items-center justify-center text-[10px] font-bold ${category.theme.bg} ${category.theme.text}">
                                ${index + 1}
                            </span>
                            <a href="${link.url}" target="_blank" rel="noopener noreferrer" 
                               class="text-sm font-medium text-slate-700 hover:text-brand hover:underline transition-all truncate" title="Buka ${link.title}">
                                ${link.title}
                            </a>
                        </div>
                        <div class="flex items-center gap-0.5">
                            <a href="${link.url}" target="_blank" rel="noopener noreferrer" 
                               class="p-1.5 rounded-md hover:bg-slate-100 transition-colors" title="Buka Link">
                                ${externalLinkIcon}
                            </a>
                            <button onclick="copyToClipboard('${link.url}')" 
                               class="p-1.5 rounded-md hover:bg-slate-100 transition-colors" title="Salin Link">
                                ${copyIcon}
                            </button>
                        </div>
                    `;
                    linksContainer.appendChild(linkItem);
                });

                card.appendChild(linksContainer);
                cardsContainer.appendChild(card);
            });

            // Toggle Empty State
            if (hasVisibleCards) {
                cardsContainer.classList.remove('hidden');
                emptyState.classList.add('hidden');
            } else {
                cardsContainer.classList.add('hidden');
                emptyState.classList.remove('hidden');
            }
        }

        function updateTotalCount() {
            let total = 0;
            appData.forEach(cat => total += cat.links.length);
            totalLinksCountEl.textContent = `${total} link tersedia`;
        }

        // --- Utility Functions ---

        function copyToClipboard(text) {
            // Modern Clipboard API
            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(text).then(() => {
                    showToast('Link berhasil disalin!');
                }).catch(err => {
                    fallbackCopyTextToClipboard(text);
                });
            } else {
                // Fallback
                fallbackCopyTextToClipboard(text);
            }
        }

        function fallbackCopyTextToClipboard(text) {
            var textArea = document.createElement("textarea");
            textArea.value = text;
            
            // Avoid scrolling to bottom
            textArea.style.top = "0";
            textArea.style.left = "0";
            textArea.style.position = "fixed";

            document.body.appendChild(textArea);
            textArea.focus();
            textArea.select();

            try {
                var successful = document.execCommand('copy');
                if(successful) {
                    showToast('Link berhasil disalin!');
                } else {
                    showToast('Gagal menyalin link.', true);
                }
            } catch (err) {
                showToast('Browser tidak mendukung.', true);
            }

            document.body.removeChild(textArea);
        }

        function showToast(message, isError = false) {
            const toast = document.createElement('div');
            toast.className = `toast px-4 py-3 rounded-lg shadow-lg text-sm font-medium text-white flex items-center gap-2 z-50 ${isError ? 'bg-red-500' : 'bg-slate-800'}`;
            
            const icon = isError ? '⚠️' : '✅';
            toast.innerHTML = `<span>${icon}</span> <span>${message}</span>`;
            
            toastContainer.appendChild(toast);

            // Remove after animation
            setTimeout(() => {
                if (toastContainer.contains(toast)) {
                    toastContainer.removeChild(toast);
                }
            }, 2000);
        }

        // Run init on load
        document.addEventListener('DOMContentLoaded', init);

    </script>
</body>
</html>
