        // ======= STATE MANAGEMENT =======

        let expandedFlows = new Set(); // Menyimpan ID flow yang sedang dibuka
        let currentSearchQuery = '';

        // ======= FUNCTIONS =======
        
        // Ganti Tab
        function switchTab(tab) {
            activeTab = tab;
            renderApp();
        }

        // Buka/Tutup Accordion Flow
        function toggleFlow(id) {
            if (expandedFlows.has(id)) {
                expandedFlows.delete(id);
            } else {
                expandedFlows.add(id);
            }
            renderFlowsContent(currentSearchQuery);
            lucide.createIcons();
        }

        // Render Bagian Tab Navigasi
        function renderTabs() {
            const container = document.getElementById('tabs-container');
            
            // Menyimpan styling dasar tab ke dalam satu variabel. Ditambahkan h-10 agar selalu konsisten dengan kolom pencarian
            const baseClass = "h-10 px-4 md:px-5 rounded-full font-medium text-xs md:text-sm flex items-center justify-center gap-2 transition-colors whitespace-nowrap outline-none focus:ring-2 focus:ring-brand focus:ring-offset-1";
            const activeClass = "bg-brand text-white shadow-sm";
            const inactiveClass = "bg-gray-200 text-gray-600 hover:bg-gray-300";

            container.innerHTML = `
                <button onclick="switchTab('menu')" class="${baseClass} ${activeTab === 'menu' ? activeClass : inactiveClass}">
                    <i data-lucide="layout-grid" class="w-4 h-4"></i>
                    Daftar Menu
                </button>
                <button onclick="switchTab('flow')" class="${baseClass} ${activeTab === 'flow' ? activeClass : inactiveClass}">
                    <i data-lucide="git-merge" class="w-4 h-4"></i>
                    Panduan Flow
                </button>
            `;
        }

        // Render HTML untuk Daftar Menu dengan Fitur Pencarian
        function getMenuHTML(searchQuery = '') {
            let html = '';
            let hasResult = false;
            const lowerQuery = searchQuery.toLowerCase();

            menuData.forEach(group => {
                // Filter item berdasarkan nama menu atau deskripsi
                const filteredItems = group.items.filter(item => 
                    item.title.toLowerCase().includes(lowerQuery) || 
                    item.desc.toLowerCase().includes(lowerQuery)
                );

                if (filteredItems.length > 0) {
                    hasResult = true;
                    html += `
                    <div class="menu-section">
                        <div class="flex items-center gap-2 md:gap-3 mb-2 md:mb-3">
                            <i data-lucide="${group.icon}" class="w-5 h-5 md:w-6 md:h-6 text-brand"></i>
                            <h2 class="text-base md:text-lg font-bold text-gray-800">${group.section}</h2>
                            <span class="bg-brand text-white text-[10px] md:text-xs font-bold px-2 py-0.5 rounded-full">${filteredItems.length}</span>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-2 md:gap-3">
                    `;
                    
                    filteredItems.forEach(item => {
                        const targetUrl = item.url ? item.url : '#';
                        html += `
                            <a href="${targetUrl}" target="_blank" rel="noopener noreferrer" class="bg-white border border-gray-200 rounded-xl p-3 md:p-3.5 flex items-center gap-3 md:gap-4 hover:border-brand/40 hover:shadow-md transition-all duration-200 cursor-pointer group text-left outline-none focus:ring-2 focus:ring-brand focus:ring-offset-2">
                                <div class="bg-brand-light text-brand p-2 md:p-3 rounded-lg shrink-0 group-hover:bg-brand group-hover:text-white transition-colors duration-200">
                                    <i data-lucide="${item.icon}" class="w-4 h-4 md:w-5 md:h-5"></i>
                                </div>
                                <div class="flex-1 min-w-0 py-0.5">
                                    <h3 class="font-semibold text-gray-800 text-[14px] md:text-[15px] truncate mb-0.5 group-hover:text-brand transition-colors duration-200">${item.title}</h3>
                                    <p class="text-[11px] md:text-[12px] text-gray-500 leading-tight line-clamp-2">${item.desc}</p>
                                </div>
                                <div class="text-gray-300 shrink-0 group-hover:text-brand transition-colors duration-200 transform group-hover:translate-x-1">
                                    <i data-lucide="arrow-right" class="w-4 h-4 md:w-5 md:h-5"></i>
                                </div>
                            </a>
                        `;
                    });
                    html += `</div></div>`;
                }
            });

            // Jika pencarian tidak membuahkan hasil
            if (!hasResult && searchQuery !== '') {
                html = `
                <div class="text-center py-10">
                    <div class="inline-flex items-center justify-center w-12 h-12 rounded-full bg-gray-100 text-gray-400 mb-3">
                        <i data-lucide="search-x" class="w-6 h-6"></i>
                    </div>
                    <p class="text-gray-500 font-medium">Tidak ada menu yang cocok dengan pencarian "${searchQuery}"</p>
                </div>`;
            }

            return html;
        }

        // Render HTML untuk Panduan Flow dengan Fitur Pencarian
        function renderFlowsContent(searchQuery = '') {
            const container = document.getElementById('flow-container');
            let html = '';
            let hasResult = false;
            const lowerQuery = searchQuery.toLowerCase();

            flowData.forEach(flow => {
                // Cek pencarian di judul atau deskripsi Flow
                const matchesFlow = flow.title.toLowerCase().includes(lowerQuery) || 
                                    flow.desc.toLowerCase().includes(lowerQuery);
                
                // Cek pencarian di judul, deskripsi atau info pada Steps
                const matchingSteps = flow.steps.filter(step => 
                    step.title.toLowerCase().includes(lowerQuery) || 
                    step.desc.toLowerCase().includes(lowerQuery) ||
                    (step.info && step.info.toLowerCase().includes(lowerQuery))
                );

                if (matchesFlow || matchingSteps.length > 0 || searchQuery === '') {
                    hasResult = true;
                    // Auto-buka accordion apabila ada pencarian dan nilainya cocok, atau gunakan state sebelumnya
                    const isExpanded = (searchQuery !== '' && (matchesFlow || matchingSteps.length > 0)) || expandedFlows.has(flow.id);
                    
                    html += `
                    <div class="bg-white border border-gray-200 rounded-xl overflow-hidden shadow-sm transition-all duration-300">
                        
                        <!-- Accordion Header -->
                        <div class="flex items-center p-3 md:p-4 cursor-pointer hover:bg-gray-50 transition-colors select-none" onclick="toggleFlow('${flow.id}')">
                            <div class="mr-2 md:mr-3 text-gray-800">
                                <i data-lucide="${isExpanded ? 'minus' : 'plus'}" class="w-5 h-5 md:w-6 md:h-6"></i>
                            </div>
                            <div class="bg-brand text-white p-1.5 md:p-2 rounded-lg mr-2 md:mr-3 shrink-0">
                                <i data-lucide="trending-up" class="w-5 h-5 md:w-6 md:h-6"></i>
                            </div>
                            <div class="flex-1 min-w-0 pr-3 md:pr-4">
                                <h3 class="font-bold text-[14px] md:text-[15px] text-gray-900 mb-0.5">${flow.title}</h3>
                                <p class="text-[11px] md:text-[12px] text-gray-500 truncate md:whitespace-normal md:line-clamp-1">${flow.desc}</p>
                            </div>
                            <div class="shrink-0 bg-brand text-white text-[10px] md:text-[11px] font-bold px-2 md:px-2.5 py-1 rounded-full whitespace-nowrap">
                                ${flow.stepsCount} step
                            </div>
                        </div>
                        
                        <!-- Accordion Body (Timeline) -->
                        <div class="${isExpanded ? 'block' : 'hidden'} border-t border-gray-100 p-4 md:p-5 bg-white relative">
                            <div class="space-y-0">
                    `;

                    flow.steps.forEach((step, index) => {
                        const isLast = index === flow.steps.length - 1;
                        const lineClass = step.isDotted ? 'border-l-[2px] border-dashed border-gray-300' : 'border-l-[2px] border-solid border-gray-800';
                        
                        html += `
                            <div class="relative flex gap-3 md:gap-4 pb-5 md:pb-6 last:pb-0">
                                <!-- Vertical Line -->
                                ${!isLast ? `<div class="absolute left-[13px] top-7 bottom-[-6px] ${lineClass}"></div>` : ''}
                                
                                <!-- Circle Indicator -->
                                <div class="w-7 h-7 rounded-full bg-brand text-white flex items-center justify-center font-bold text-[12px] shrink-0 z-10 relative shadow-sm mt-0.5">
                                    ${index + 1}
                                </div>
                                
                                <!-- Content Box -->
                                <div class="flex-1 pt-0.5 pb-0">
                                    <h4 class="text-[13px] md:text-[14px] font-bold text-gray-900 mb-0.5">${step.title}</h4>
                                    <p class="text-[11px] md:text-[12px] text-gray-600 mb-2 leading-snug max-w-3xl">${step.desc}</p>
                                    
                                    ${step.info ? `
                                    <div class="bg-blue-50 border border-blue-200/60 rounded-lg p-2 md:p-2.5 flex gap-2 mb-2 max-w-2xl">
                                        <i data-lucide="info" class="w-4 h-4 text-blue-500 shrink-0 mt-0.5"></i>
                                        <p class="text-[11px] md:text-[12px] text-blue-700 leading-tight">${step.info}</p>
                                    </div>
                                    ` : ''}
                                    
                                    ${step.button ? `
                                    <a href="${step.url}" target="_blank" rel="noopener noreferrer" class="inline-flex items-center gap-1.5 px-3 py-1.5 bg-white border border-brand/30 text-brand rounded-full text-[10px] md:text-[11px] font-semibold hover:bg-brand-light hover:border-brand/50 transition-colors shadow-sm w-fit outline-none focus:ring-2 focus:ring-brand focus:ring-offset-2">
                                        <i data-lucide="external-link" class="w-3.5 h-3.5"></i>
                                        ${step.button}
                                    </a>
                                    ` : ''}
                                </div>
                            </div>
                        `;
                    });

                    html += `
                            </div>
                        </div>
                    </div>
                    `;
                }
            });

            // Jika pencarian tidak membuahkan hasil
            if (!hasResult && searchQuery !== '') {
                html = `
                <div class="text-center py-10">
                    <div class="inline-flex items-center justify-center w-12 h-12 rounded-full bg-gray-100 text-gray-400 mb-3">
                        <i data-lucide="search-x" class="w-6 h-6"></i>
                    </div>
                    <p class="text-gray-500 font-medium">Tidak ada panduan flow yang cocok dengan pencarian "${searchQuery}"</p>
                </div>`;
            }

            container.innerHTML = html;
        }

        // Fungsi Induk untuk memanggil dan merender konten secara dinamis
        function renderApp() {
            renderTabs();
            
            const menuContainer = document.getElementById('menu-container');
            const flowContainer = document.getElementById('flow-container');

            if (activeTab === 'menu') {
                menuContainer.style.display = 'block';
                flowContainer.style.display = 'none';
                menuContainer.innerHTML = getMenuHTML(currentSearchQuery);
            } else {
                menuContainer.style.display = 'none';
                flowContainer.style.display = 'block';
                renderFlowsContent(currentSearchQuery);
            }

            // Inisialisasi ikon
            lucide.createIcons();
        }

        // --- DOM CONTENT LOADED & EVENTS ---
        document.addEventListener('DOMContentLoaded', () => {
            renderApp();

            // Event Listener Pencarian Data
            document.getElementById('searchInput').addEventListener('input', (e) => {
                currentSearchQuery = e.target.value;
                if (activeTab === 'menu') {
                    document.getElementById('menu-container').innerHTML = getMenuHTML(currentSearchQuery);
                } else {
                    renderFlowsContent(currentSearchQuery);
                }
                lucide.createIcons();
            });
        });

        // --- SCROLL EVENT UNTUK STICKY HEADER ---
        window.addEventListener('scroll', () => {
            const stickyHeader = document.getElementById('sticky-header');
            
            if (window.scrollY > 15) {
                // Tambahkan sedikit bayangan di header agar batasnya terlihat saat mengambang
                stickyHeader.classList.add('shadow-[0_10px_20px_-10px_rgba(0,0,0,0.08)]');
            } else {
                // Hilangkan bayangan
                stickyHeader.classList.remove('shadow-[0_10px_20px_-10px_rgba(0,0,0,0.08)]');
            }
        });
    </script>
</body>
</html>
